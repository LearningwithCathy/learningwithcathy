            // Cancel any ongoing speech
            synthRef.current.cancel();

            const cleanText = text
              .replace(/\[|\]/g, '')
              .replace(/_/g, '')
              .replace(/^[—\-\s]+/, '')
              .replace(/\n[—\-\s]+/g, ' ');
            
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = lang;
            utterance.rate = 0.85; // Slightly slower for better clarity
            
            // Fix for some mobile browsers where speech hangs
            utterance.onend = () => {
                synthRef.current.cancel();
            };
            
            synthRef.current.speak(utterance);
          };

          const renderHighlightedText = (text) => {
            const parts = text.split(/(\[.*?\])/g);
            return parts.map((part, i) => {
              if (part.startsWith('[') && part.endsWith(']')) {
                return (
                  <span key={i} className="text-emerald-400 font-bold">
                    {part.slice(1, -1)}
                  </span>
                );
              }
              return part;
            });
          };

          const handleNext = useCallback(() => {
            if (currentIndex < VOCABULARY_LIST.length - 1) {
              setDirection(1);
              setIsFlipped(false);
              setTimeout(() => setCurrentIndex(prev => prev + 1), 50);
            } else {
              setShowSummary(true);
            }
          }, [currentIndex]);

          const handlePrev = useCallback(() => {
            if (currentIndex > 0) {
              setDirection(-1);
              setIsFlipped(false);
              setTimeout(() => setCurrentIndex(prev => prev - 1), 50);
            }
          }, [currentIndex]);

          const toggleMastered = () => {
            if (isMastered) {
              setMasteredIds(prev => prev.filter(id => id !== currentWord.id));
            } else {
              setMasteredIds(prev => [...prev, currentWord.id]);
            }
          };

          const restart = () => {
            setCurrentIndex(0);
            setIsFlipped(false);
            setMasteredIds([]);
            setShowSummary(false);
          };

          useEffect(() => {
            const handleKeyDown = (e) => {
              if (showSummary) return;
              
              if (e.code === 'Space') {
                e.preventDefault();
                setIsFlipped(prev => !prev);
              } else if (e.code === 'ArrowRight') {
                handleNext();
              } else if (e.code === 'ArrowLeft') {
                handlePrev();
              } else if (e.code === 'KeyV') {
                speak(currentWord.type === 'sentence' ? currentWord.example : currentWord.word);
              }
            };

            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [handleNext, handlePrev, showSummary, currentWord]);

          const categoryColors = {
            Fruit: 'bg-pink-100 text-pink-600 border-pink-200',
            Vegetable: 'bg-green-100 text-green-600 border-green-200',
            Meat: 'bg-red-100 text-red-600 border-red-200',
            Snack: 'bg-yellow-100 text-yellow-600 border-yellow-200',
            Food: 'bg-orange-100 text-orange-600 border-orange-200',
            Drink: 'bg-blue-100 text-blue-600 border-blue-200',
            People: 'bg-purple-100 text-purple-600 border-purple-200',
            'Verb/Noun': 'bg-indigo-100 text-indigo-600 border-indigo-200',
            Pronoun: 'bg-stone-100 text-stone-600 border-stone-200',
            Noun: 'bg-cyan-100 text-cyan-600 border-cyan-200',
            Dining: 'bg-teal-100 text-teal-600 border-teal-200',
            Verb: 'bg-violet-100 text-violet-600 border-violet-200',
            Ingredient: 'bg-amber-100 text-amber-600 border-amber-200',
            Phrase: 'bg-rose-100 text-rose-600 border-rose-200',
            'Verb Phrase': 'bg-sky-100 text-sky-600 border-sky-200',
          };

          const getCategoryStyle = (category) => categoryColors[category] || 'bg-gray-100 text-gray-600 border-gray-200';

          if (showSummary) {
            return (
              <div className="min-h-screen bg-gradient-to-br from-yellow-400 via-orange-400 to-red-400 flex items-center justify-center p-4 md:p-6 font-sans overflow-hidden relative">
                <motion.div 
                  animate={{ rotate: 360 }}
                  transition={{ duration: 20, repeat: Infinity, ease: "linear" }}
                  className="absolute -top-20 -left-20 w-64 h-64 bg-white/20 rounded-full blur-3xl"
                />
                <motion.div 
                  animate={{ rotate: -360 }}
                  transition={{ duration: 25, repeat: Infinity, ease: "linear" }}
                  className="absolute -bottom-20 -right-20 w-80 h-80 bg-yellow-200/30 rounded-full blur-3xl"
                />

                <motion.div 
                  initial={{ scale: 0.8, opacity: 0 }}
                  animate={{ scale: 1, opacity: 1 }}
                  className="bg-white rounded-[2rem] md:rounded-[3rem] shadow-2xl p-6 md:p-10 max-w-2xl w-full text-center relative z-10 border-4 md:border-8 border-yellow-200"
                >
                  <motion.div
                    animate={{ y: [0, -10, 0] }}
                    transition={{ duration: 2, repeat: Infinity }}
                    className="inline-block p-4 md:p-6 bg-yellow-100 rounded-full mb-4 md:mb-6"
                  >
                    <Icon name="trophy" className="w-12 h-12 md:w-20 md:h-20 text-yellow-500" />
                  </motion.div>
                  
                  <h2 className="text-3xl md:text-5xl font-display font-bold text-gray-800 mb-2 md:mb-4">太棒了！</h2>
                  <p className="text-lg md:text-xl text-gray-600 mb-6 md:mb-8 font-medium">你已经完成了所有的词汇复习！</p>
                  
                  <div className="grid grid-cols-2 gap-4 md:gap-6 mb-8 md:mb-10">
                    <div className="bg-green-50 p-4 md:p-6 rounded-[1.5rem] md:rounded-[2rem] border-2 border-green-100">
                      <div className="text-2xl md:text-4xl font-display font-bold text-green-600 mb-1">{masteredIds.length}</div>
                      <div className="text-[10px] md:text-sm font-bold text-green-500 uppercase tracking-wider">已掌握</div>
                    </div>
                    <div className="bg-orange-50 p-4 md:p-6 rounded-[1.5rem] md:rounded-[2rem] border-2 border-orange-100">
                      <div className="text-2xl md:text-4xl font-display font-bold text-orange-600 mb-1">{VOCABULARY_LIST.length - masteredIds.length}</div>
                      <div className="text-[10px] md:text-sm font-bold text-orange-500 uppercase tracking-wider">待加强</div>
                    </div>
                  </div>

                  <button
                    onClick={restart}
                    className="group flex items-center justify-center gap-3 w-full py-4 md:py-5 bg-gradient-to-r from-orange-500 to-yellow-500 text-white rounded-xl md:rounded-2xl font-display font-bold text-xl md:text-2xl shadow-lg hover:shadow-xl transition-all active:scale-95"
                  >
                    <Icon name="rotate-ccw" className="w-6 h-6 md:w-7 md:h-7 group-hover:rotate-180 transition-transform duration-500" />
                    重新开始
                  </button>
                </motion.div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-white flex flex-col items-center p-4 md:p-8 font-sans overflow-hidden relative no-select">
              <header className="w-full max-w-4xl flex flex-col md:flex-row items-center justify-between mb-6 md:mb-12 gap-4 md:gap-6 relative z-10">
                <div className="flex items-center gap-3 md:gap-4">
                  <div className="p-1.5 md:p-2 bg-stone-900 rounded-lg">
                    <Icon name="book-open" className="w-4 h-4 md:w-5 md:h-5 text-white" />
                  </div>
                  <h1 className="text-lg md:text-xl font-display font-bold text-stone-900 tracking-tight">
                    词汇挑战
                  </h1>
                </div>

                <div className="flex-1 max-w-md w-full px-2 md:px-4">
                  <div className="flex justify-between items-end mb-1.5 md:mb-2">
                    <span className="text-stone-400 font-medium text-[10px] md:text-xs uppercase tracking-widest">
                      Progress: {currentIndex + 1} / {VOCABULARY_LIST.length}
                    </span>
                    <span className="text-stone-900 font-bold text-[10px] md:text-xs">
                      {Math.round(progress)}%
                    </span>
                  </div>
                  <div className="h-1 w-full bg-stone-100 rounded-full overflow-hidden">
                    <motion.div 
                      className="h-full bg-stone-900 rounded-full"
                      initial={{ width: 0 }}
                      animate={{ width: `${progress}%` }}
                      transition={{ type: "spring", stiffness: 50 }}
                    />
                  </div>
                </div>
              </header>

              <main className="flex-1 flex flex-col items-center justify-center w-full max-w-4xl relative z-10">
                <div className="relative w-full aspect-[4/5] md:aspect-[16/10] max-h-[70vh] md:max-h-[600px] perspective-1000 p-1.5 md:p-2 rounded-[2rem] md:rounded-[3rem] bg-gradient-to-br from-emerald-50 to-emerald-100 border-2 md:border-4 border-emerald-200 shadow-xl">
                  <AnimatePresence mode="wait">
                    <motion.div
                      key={currentIndex}
                      initial={{ x: direction * 100, opacity: 0, rotateY: 0 }}
                      animate={{ x: 0, opacity: 1 }}
                      exit={{ x: direction * -100, opacity: 0 }}
                      transition={{ type: "spring", damping: 20, stiffness: 100 }}
                      className="w-full h-full"
                    >
                      <motion.div
                        className="w-full h-full relative transform-style-3d cursor-pointer"
                        animate={{ rotateY: isFlipped ? 180 : 0 }}
                        transition={{ type: "spring", stiffness: 260, damping: 20 }}
                        onClick={() => setIsFlipped(!isFlipped)}
                      >
                        {/* Front Side */}
                        <div className="absolute inset-0 backface-hidden bg-white rounded-[1.8rem] md:rounded-[2.5rem] shadow-sm p-6 md:p-8 flex flex-col items-center justify-center border border-stone-100 overflow-hidden">
                          <div className="absolute top-6 md:top-10 left-6 md:left-10">
                            <div className="flex items-center gap-1.5 md:gap-2 text-stone-900 font-logo text-sm md:text-lg opacity-80">
                              <Icon name="sparkles" className="w-3.5 h-3.5 md:w-4 md:h-4" />
                              Learning with Cathy
                            </div>
                          </div>

                          <div className="flex flex-col items-center justify-center text-center flex-1 w-full px-2 md:px-6">
                            {currentWord.type === 'sentence' ? (
                              <div className="space-y-3 md:space-y-4 w-full">
                                <div className="flex flex-col items-center gap-2 md:gap-3">
                                  <p className="text-sm md:text-lg font-display font-medium text-stone-400">
                                    {currentWord.translation}
                                  </p>
                                  <button
                                    onClick={(e) => {
                                      e.stopPropagation();
                                      speak(currentWord.example);
                                    }}
                                    className="p-2.5 md:p-2 text-stone-300 hover:text-stone-900 transition-colors active:scale-90"
                                  >
                                    <Icon name="volume-2" className="w-5 h-5 md:w-6 md:h-6" />
                                  </button>
                                </div>
                                <div className="text-lg md:text-2xl font-display font-bold text-stone-900 leading-relaxed whitespace-pre-wrap break-words">
                                  {currentWord.word}
                                </div>
                              </div>
                            ) : (
                              <>
                                <motion.h2 
                                  className="text-5xl sm:text-7xl md:text-8xl lg:text-10xl font-display font-bold text-stone-900 mb-2 tracking-tight break-words"
                                >
                                  {currentWord.word}
                                </motion.h2>
                                <div className="flex items-center gap-3 md:gap-4 opacity-40">
                                  <span className="text-lg md:text-xl font-mono text-stone-400 font-medium">
                                    {currentWord.phonetic}
                                  </span>
                                  <button
                                    onClick={(e) => {
                                      e.stopPropagation();
                                      speak(currentWord.word);
                                    }}
                                    className="p-2.5 md:p-2 text-stone-400 hover:text-stone-900 transition-colors active:scale-90"
                                  >
                                    <Icon name="volume-2" className="w-5 h-5 md:w-6 md:h-6" />
                                  </button>
                                </div>
                              </>
                            )}
                          </div>

                          <div className="absolute bottom-8 md:bottom-12 w-full text-center">
                            <div className="text-stone-200 font-bold text-[9px] md:text-[10px] uppercase tracking-[0.3em]">
                              点击翻面
                            </div>
                          </div>
                        </div>

                        {/* Back Side */}
                        <div className="absolute inset-0 backface-hidden bg-black rounded-[1.8rem] md:rounded-[2.5rem] shadow-sm p-6 md:p-8 flex flex-col rotate-y-180 border border-stone-800 overflow-hidden">
                          <div className="flex justify-between items-start mb-4 md:mb-8">
                            <div className="flex items-center gap-1.5 md:gap-2 text-stone-300 font-logo text-sm md:text-lg opacity-80">
                              <Icon name="sparkles" className="w-3.5 h-3.5 md:w-4 md:h-4" />
                              Learning with Cathy
                            </div>
                            <div className={`px-2.5 py-0.5 md:px-3 md:py-1 rounded-full border font-bold text-[8px] md:text-[9px] uppercase tracking-widest ${getCategoryStyle(currentWord.category)}`}>
                              {currentWord.category}
                            </div>
                          </div>

                          <div className="flex flex-col md:flex-row gap-4 md:gap-10 flex-1 overflow-hidden">
                            <div className="flex-1 flex flex-col min-h-0">
                              <div className="mb-3 md:mb-4">
                                <h3 className="text-stone-600 text-[8px] md:text-[9px] font-bold uppercase tracking-[0.2em] mb-1 md:mb-2">
                                  {currentWord.type === 'sentence' ? 'Translation' : 'Meaning'}
                                </h3>
                                <p className={`${currentWord.type === 'sentence' ? 'text-lg md:text-xl' : 'text-2xl md:text-4xl'} font-display font-bold text-white`}>
                                  {currentWord.translation}
                                </p>
                              </div>

                              <div className={`flex-1 bg-stone-900/50 rounded-2xl md:rounded-3xl ${currentWord.type === 'sentence' ? 'p-4 md:p-5' : 'p-5 md:p-8'} border border-stone-800 overflow-y-auto`}>
                                <h3 className="text-stone-600 text-[8px] md:text-[9px] font-bold uppercase tracking-[0.2em] mb-3 md:mb-4">
                                  {currentWord.type === 'sentence' ? 'Full Sentence' : 'Example'}
                                </h3>
                                <div className="space-y-3 md:space-y-4">
                                  <div className="flex items-start gap-3 md:gap-4">
                                    <button
                                      onClick={(e) => {
                                        e.stopPropagation();
                                        speak(currentWord.example);
                                      }}
                                      className="mt-0.5 p-2 text-stone-600 hover:text-white transition-colors active:scale-90"
                                    >
                                      <Icon name="volume-2" className="w-5 h-5 md:w-6 md:h-6" />
                                    </button>
                                    <div className="flex-1">
                                      <div className={`${currentWord.type === 'sentence' ? 'text-base md:text-lg' : 'text-lg md:text-xl'} font-medium text-stone-100 leading-relaxed whitespace-pre-wrap break-words`}>
                                        {currentWord.type === 'sentence' 
                                          ? renderHighlightedText(currentWord.example)
                                          : currentWord.example}
                                      </div>
                                      {currentWord.type !== 'sentence' && (
                                        <p className="text-stone-400 mt-2 text-sm md:text-base italic">
                                          {currentWord.exampleTranslation}
                                        </p>
                                      )}
                                    </div>
                                  </div>
                                </div>
                              </div>
                            </div>

                            <div className="w-full md:w-5/12 h-32 md:h-full flex-shrink-0">
                              <div className="w-full h-full rounded-2xl md:rounded-3xl overflow-hidden shadow-sm border border-stone-800 transition-all duration-700">
                                <img 
                                  src={currentWord.imageUrl} 
                                  alt={currentWord.word}
                                  referrerPolicy="no-referrer"
                                  className="w-full h-full object-cover"
                                />
                              </div>
                            </div>
                          </div>
                        </div>
                      </motion.div>
                    </motion.div>
                  </AnimatePresence>
                </div>

                <div className="mt-6 md:mt-10 flex items-center gap-4 md:gap-6 relative z-10">
                  <button
                    onClick={handlePrev}
                    disabled={currentIndex === 0}
                    className="p-3.5 md:p-4 bg-white text-stone-400 rounded-full shadow-sm hover:text-stone-800 disabled:opacity-30 disabled:cursor-not-allowed transition-all active:scale-90 border border-stone-200"
                  >
                    <Icon name="chevron-left" className="w-5 h-5 md:w-6 md:h-6" />
                  </button>

                  <button
                    onClick={toggleMastered}
                    className={`flex items-center gap-2 md:gap-3 px-6 md:px-8 py-2.5 md:py-3 rounded-full font-display font-bold text-base md:text-lg shadow-sm transition-all active:scale-95 border ${
                      isMastered 
                        ? 'bg-stone-800 text-white border-stone-800' 
                        : 'bg-white text-stone-400 border-stone-200 hover:border-stone-400 hover:text-stone-600'
                    }`}
                  >
                    {isMastered ? (
                      <>
                        <Icon name="check-circle-2" className="w-4 h-4 md:w-5 md:h-5" />
                        已掌握
                      </>
                    ) : (
                      <>
                        <Icon name="heart" className="w-4 h-4 md:w-5 md:h-5" />
                        掌握它
                      </>
                    )}
                  </button>

                  <button
                    onClick={handleNext}
                    className="p-3.5 md:p-4 bg-white text-stone-400 rounded-full shadow-sm hover:text-stone-800 transition-all active:scale-90 border border-stone-200"
                  >
                    <Icon name="chevron-right" className="w-5 h-5 md:w-6 md:h-6" />
                  </button>
                </div>
              </main>

              <footer className="mt-auto py-4 md:py-6 relative z-10 w-full">
                <div className="flex flex-wrap justify-center gap-4 md:gap-6">
                  {[
                    { key: '空格', action: '翻转' },
                    { key: '← / →', action: '切换' },
                    { key: 'V', action: '发音' },
                  ].map((item) => (
                    <div key={item.key} className="flex items-center gap-1.5 md:gap-2 opacity-40 hover:opacity-100 transition-opacity">
                      <span className="bg-stone-200 text-stone-600 px-1.5 py-0.5 rounded text-[9px] md:text-[10px] font-bold">
                        {item.key}
                      </span>
                      <span className="text-stone-500 text-[10px] md:text-xs font-medium">{item.action}</span>
                    </div>
                  ))}
                </div>
              </footer>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
